<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中国养老资源数据平台</title>

<script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>
<script src="data.js"></script>

<style>
body{
    margin:0;
    font-family:"微软雅黑",sans-serif;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:#fff;
    text-align:center;
}

h1{
    margin-top:20px;
    margin-bottom:10px;
}

.sub{
    color:#d9e6ee;
    font-size:14px;
    margin-bottom:20px;
}

.kpi{
    display:flex;
    justify-content:space-around;
    gap:12px;
    margin:20px;
    flex-wrap:wrap;
}

.kpi div{
    background:rgba(255,255,255,0.1);
    padding:15px;
    border-radius:12px;
    min-width:160px;
    flex:1;
}

.kpi h2{
    margin:0 0 8px 0;
}

.chart-box{
    width:92%;
    margin:20px auto;
    background:rgba(255,255,255,0.08);
    border-radius:14px;
    padding:16px;
}

.chart-title{
    text-align:left;
    margin:0 0 10px 0;
    font-size:18px;
}

.chart{
    width:100%;
    height:380px;
}

.rank-box{
    width:92%;
    margin:20px auto;
    background:rgba(255,255,255,0.08);
    border-radius:14px;
    padding:16px;
    text-align:left;
}

.rank-list{
    margin-top:10px;
}

.rank-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 10px;
    margin-bottom:8px;
    background:rgba(255,255,255,0.08);
    border-radius:10px;
}

.rank-left{
    display:flex;
    gap:10px;
    align-items:center;
}

.rank-num{
    width:28px;
    height:28px;
    line-height:28px;
    text-align:center;
    border-radius:50%;
    background:rgba(255,255,255,0.18);
    font-weight:bold;
}

.rank-name{
    font-size:15px;
}

.rank-value{
    color:#dff6ff;
    font-weight:bold;
}

.qa-box{
    width:92%;
    margin:20px auto 40px;
    background:rgba(255,255,255,0.08);
    border-radius:14px;
    padding:16px;
    text-align:left;
}

.qa-row{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-top:10px;
}

.qa-row input{
    flex:1;
    min-width:220px;
    padding:12px;
    border:none;
    border-radius:10px;
    outline:none;
}

.qa-row button{
    padding:12px 18px;
    border:none;
    border-radius:10px;
    background:#2f54eb;
    color:#fff;
    cursor:pointer;
}

#answer{
    margin-top:14px;
    line-height:1.8;
    color:#eaf3f8;
}

@media (max-width:768px){
    .chart{
        height:300px;
    }
}
</style>
</head>

<body>

<h1>中国养老资源数据平台</h1>
<div class="sub">2014—2025 数据展示 + 趋势分析 + 未来预测</div>

<div class="kpi">
    <div>
        <h2 id="k1">--</h2>
        <p>机构数（万）</p>
    </div>

    <div>
        <h2 id="k2">--</h2>
        <p>床位数（万）</p>
    </div>

    <div>
        <h2 id="k3">--</h2>
        <p>老龄化率</p>
    </div>
</div>

<div class="chart-box">
    <h3 class="chart-title">养老机构数量趋势</h3>
    <div id="chart1" class="chart"></div>
</div>

<div class="chart-box">
    <h3 class="chart-title">养老床位数趋势</h3>
    <div id="chart2" class="chart"></div>
</div>

<div class="chart-box">
    <h3 class="chart-title">未来机构数量预测</h3>
    <div id="chart3" class="chart"></div>
</div>

<div class="rank-box">
    <h3 class="chart-title">省份养老资源 Top10</h3>
    <div id="rankList" class="rank-list"></div>
</div>

<div class="qa-box">
    <h3 style="margin:0;">简单问答</h3>
    <div class="qa-row">
        <input id="question" placeholder="输入问题，例如：趋势、预测、老龄化、排名">
        <button onclick="askQuestion()">提问</button>
    </div>
    <div id="answer">这里会显示回答。</div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

    // KPI
    document.getElementById("k1").innerText = kpi.org;
    document.getElementById("k2").innerText = kpi.beds;
    document.getElementById("k3").innerText = kpi.aging + "%";

    // 图1：机构数趋势
    const chart1 = echarts.init(document.getElementById('chart1'));
    chart1.setOption({
        tooltip:{ trigger:'axis' },
        xAxis:{
            type:'category',
            data:years,
            axisLabel:{ color:'#fff' }
        },
        yAxis:{
            type:'value',
            axisLabel:{ color:'#fff' }
        },
        series:[{
            data:orgData,
            type:'line',
            smooth:true
        }]
    });

    // 图2：床位趋势
    const chart2 = echarts.init(document.getElementById('chart2'));
    chart2.setOption({
        tooltip:{ trigger:'axis' },
        xAxis:{
            type:'category',
            data:years,
            axisLabel:{ color:'#fff' }
        },
        yAxis:{
            type:'value',
            axisLabel:{ color:'#fff' }
        },
        series:[{
            data:bedData,
            type:'line',
            smooth:true
        }]
    });

    // 图3：预测
    const chart3 = echarts.init(document.getElementById('chart3'));
    chart3.setOption({
        tooltip:{ trigger:'axis' },
        xAxis:{
            type:'category',
            data:forecastYears,
            axisLabel:{ color:'#fff' }
        },
        yAxis:{
            type:'value',
            axisLabel:{ color:'#fff' }
        },
        series:[{
            data:orgForecast,
            type:'line',
            smooth:true
        }]
    });

    // 排行榜
    const rankList = document.getElementById("rankList");
    rankList.innerHTML = "";
    top10.forEach(function(item, index){
        const row = document.createElement("div");
        row.className = "rank-item";
        row.innerHTML = `
            <div class="rank-left">
                <div class="rank-num">${index + 1}</div>
                <div class="rank-name">${item.name}</div>
            </div>
            <div class="rank-value">${item.value}</div>
        `;
        rankList.appendChild(row);
    });

    window.addEventListener('resize', function(){
        chart1.resize();
        chart2.resize();
        chart3.resize();
    });
});

function askQuestion(){
    const q = document.getElementById("question").value.trim();
    const a = document.getElementById("answer");

    if(!q){
        a.innerText = "请输入问题。";
        return;
    }

    if(q.includes("趋势")){
        a.innerText = "从图表看，养老机构数量和床位数总体呈上升趋势，说明养老服务供给规模在逐步扩大。";
    }else if(q.includes("预测")){
        a.innerText = "预测结果显示，未来几年养老资源需求仍会增长，机构数量和床位配置需要继续优化。";
    }else if(q.includes("老龄化")){
        a.innerText = "老龄化率持续上升，表明老年人口占比不断提高，这会进一步推高养老服务需求。";
    }else if(q.includes("排名")){
        a.innerText = "从当前排行榜看，广东、河南、四川、山东等省份养老资源指数较高，说明人口大省和经济较强地区的资源配置更为集中。";
    }else{
        a.innerText = "暂未匹配到该问题，建议输入：趋势、预测、老龄化、排名。";
    }
}
</script>

</body>
</html>
