<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中国养老资源数据分析平台</title>

<script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>

<style>
body {
    margin: 0;
    font-family: "微软雅黑";
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color: white;
}

/* ===== 液态玻璃卡片 ===== */
.glass {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    border-radius: 16px;
    padding: 20px;
    margin: 20px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

/* 标题 */
header {
    text-align: center;
    padding: 30px;
}

/* KPI 卡片 */
.kpi {
    display: flex;
    justify-content: space-around;
    flex-wrap: wrap;
}

.kpi div {
    text-align: center;
    margin: 10px;
}

/* 图表 */
.chart {
    width: 100%;
    height: 400px;
}
</style>
</head>

<body>

<header>
    <h1>中国养老资源数据分析平台</h1>
    <p>2014—2025趋势分析 + 未来预测</p>
</header>

<!-- KPI -->
<div class="glass kpi">
    <div>
        <h2 id="orgTotal">--</h2>
        <p>养老机构数量（万）</p>
    </div>
    <div>
        <h2 id="bedTotal">--</h2>
        <p>养老床位（万）</p>
    </div>
    <div>
        <h2 id="aging">--</h2>
        <p>老龄化比例</p>
    </div>
</div>

<!-- 图1 -->
<div class="glass">
    <div id="chart1" class="chart"></div>
</div>

<!-- 图2 -->
<div class="glass">
    <div id="chart2" class="chart"></div>
</div>

<script>

// ===== 数据（你可以后面换成真实Excel数据）=====
let years = [2014,2015,2016,2017,2018,2019,2020,2021,2022,2023,2024,2025];
let org = [3.3,3.4,3.5,3.7,3.8,3.9,4.1,4.2,4.3,4.2,4.0,3.9];
let beds = [578,672,720,750,780,800,820,830,840,820,790,768];
let agingRate = [10.1,10.5,10.8,11.4,11.9,12.6,13.5,14.2,14.9,15.4,15.8,16.2];

// ===== KPI =====
document.getElementById("orgTotal").innerText = org[org.length-1];
document.getElementById("bedTotal").innerText = beds[beds.length-1];
document.getElementById("aging").innerText = agingRate[agingRate.length-1] + "%";

// ===== 图1：机构 =====
let chart1 = echarts.init(document.getElementById('chart1'));
chart1.setOption({
    title: { text: '养老机构数量趋势', textStyle:{color:'#fff'} },
    tooltip: { trigger: 'axis' },
    xAxis: { data: years, axisLabel:{color:'#fff'} },
    yAxis: { axisLabel:{color:'#fff'} },
    series: [{
        data: org,
        type: 'line',
        smooth: true
    }]
});

// ===== 图2：床位 =====
let chart2 = echarts.init(document.getElementById('chart2'));
chart2.setOption({
    title: { text: '养老床位变化趋势', textStyle:{color:'#fff'} },
    tooltip: { trigger: 'axis' },
    xAxis: { data: years, axisLabel:{color:'#fff'} },
    yAxis: { axisLabel:{color:'#fff'} },
    series: [{
        data: beds,
        type: 'line',
        smooth: true
    }]
});

</script>

</body>
</html>
