<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中国养老资源数据分析平台</title>

<script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>
<script src="data.js"></script>

<style>
body{
margin:0;
font-family:"微软雅黑";
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:#fff;
}

nav{
text-align:center;
padding:15px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
}

nav a{
margin:10px;
cursor:pointer;
}

.glass{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
border-radius:16px;
padding:20px;
margin:20px;
}

.kpi{
display:flex;
justify-content:space-around;
flex-wrap:wrap;
text-align:center;
}

.chart{
width:100%;
height:400px;
}

.page{display:none;}
.active{display:block;}
</style>
</head>

<body>

<nav>
<a onclick="show('home')">首页</a>
<a onclick="show('history')">历史分析</a>
<a onclick="show('forecast')">预测分析</a>
<a onclick="show('qa')">智能问答</a>
</nav>

<header style="text-align:center;">
<h1>中国养老资源数据分析平台</h1>
</header>

<div id="home" class="page active">
<div class="glass kpi">
<div><h2 id="k1">--</h2><p>机构数</p></div>
<div><h2 id="k2">--</h2><p>床位数</p></div>
<div><h2 id="k3">--</h2><p>老龄化率</p></div>
</div>
</div>

<div id="history" class="page">
<div class="glass"><div id="chart1" class="chart"></div></div>
</div>

<div id="forecast" class="page">
<div class="glass"><div id="chart2" class="chart"></div></div>
</div>

<div id="qa" class="page">
<div class="glass">
<input id="q" placeholder="输入问题">
<button onclick="ask()">提问</button>
<p id="a"></p>
</div>
</div>

<script>

// 页面切换
function show(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

// ⭐⭐⭐ 核心修复：DOM加载后执行
document.addEventListener("DOMContentLoaded", function(){

// KPI
if(window.kpi){
document.getElementById("k1").innerText = kpi.org;
document.getElementById("k2").innerText = kpi.beds;
document.getElementById("k3").innerText = kpi.aging + "%";
}

// 图表1
if(window.years){
let chart1 = echarts.init(document.getElementById('chart1'));
chart1.setOption({
title:{text:'养老机构趋势',textStyle:{color:'#fff'}},
xAxis:{data:years,axisLabel:{color:'#fff'}},
yAxis:{axisLabel:{color:'#fff'}},
series:[{data:orgData,type:'line',smooth:true}]
});
}

// 图表2
if(window.forecastYears){
let chart2 = echarts.init(document.getElementById('chart2'));
chart2.setOption({
title:{text:'未来预测',textStyle:{color:'#fff'}},
xAxis:{data:forecastYears,axisLabel:{color:'#fff'}},
yAxis:{axisLabel:{color:'#fff'}},
series:[{data:orgForecast,type:'line',smooth:true}]
});
}

});


// 问答
function ask(){
let q=document.getElementById("q").value;
let a=document.getElementById("a");

if(q.includes("趋势")){
a.innerText="养老资源总体呈增长趋势。";
}else if(q.includes("预测")){
a.innerText="未来需求持续增长。";
}else{
a.innerText="请输入关键词：趋势 / 预测";
}
}

</script>

</body>
</html>
